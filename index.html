<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Strike 3D - Forest Combat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; width: calc(100% - 40px); z-index: 10; }
        
        /* Efeito de Dano na Tela */
        #damage-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 5;
            box-shadow: inset 0 0 100px rgba(255, 0, 0, 0);
            transition: box-shadow 0.2s ease-out;
        }
        
        .hit-flash {
            animation: flash-red 0.4s ease-out forwards;
        }

        @keyframes flash-red {
            0% { box-shadow: inset 0 0 150px rgba(255, 0, 0, 0.8); }
            100% { box-shadow: inset 0 0 50px rgba(255, 0, 0, 0); }
        }

        #crosshair { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            width: 30px; height: 30px; 
            border: 2px solid rgba(0, 255, 0, 0.5); 
            border-radius: 50%; 
            pointer-events: none;
            z-index: 10;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: rgba(0, 255, 0, 0.5);
        }
        #crosshair::before { top: 50%; left: -5px; width: 10px; height: 2px; }
        #crosshair::after { left: 50%; top: -5px; width: 2px; height: 10px; }

        .status-card { background: rgba(0, 0, 0, 0.7); padding: 15px; border-radius: 8px; border: 1px solid #444; backdrop-filter: blur(5px); }
        #loading-overlay {
            position: fixed; inset: 0; background: radial-gradient(circle, #1a4a1c, #0d1a0d);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; color: white; text-align: center;
        }
        .health-bar-bg { width: 100%; height: 10px; background: #333; border-radius: 5px; margin-top: 5px; overflow: hidden; }
        #health-fill { width: 100%; height: 100%; background: #4ade80; transition: width 0.3s ease; }
        .danger { background: #ef4444 !important; }
        
        #radar {
            position: absolute; bottom: 20px; right: 20px;
            width: 150px; height: 150px;
            background: rgba(0, 40, 0, 0.6);
            border: 2px solid #00ff00;
            border-radius: 50%;
            overflow: hidden;
            z-index: 10;
        }
        .radar-ping {
            position: absolute; width: 6px; height: 6px;
            border-radius: 50%; transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div id="damage-overlay"></div>

    <div id="loading-overlay">
        <h1 class="text-6xl font-black mb-4 italic tracking-tighter text-green-500">FOREST STRIKE</h1>
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-green-500 mb-4"></div>
        <p id="status-text" class="text-xl font-mono">TEXTURIZANDO GRAMA...</p>
    </div>

    <div id="ui" class="flex justify-between items-start">
        <div class="status-card w-64">
            <h2 class="text-xl font-bold text-green-400 mb-1">PILOTO: <span id="player-id">...</span></h2>
            <div class="text-sm font-semibold flex justify-between">
                <span>INTEGRIDADE:</span>
                <span><span id="health-text">100</span>%</span>
            </div>
            <div class="health-bar-bg">
                <div id="health-fill"></div>
            </div>
            <p class="mt-2 text-lg">SCORE: <span id="score" class="font-mono text-yellow-400">0</span></p>
            <div id="warning-msg" class="hidden mt-2 text-red-500 font-bold animate-pulse text-xs text-center">
                DANOS CRÍTICOS: PERDA DE ALTITUDE!
            </div>
            <div class="mt-4 text-[10px] text-gray-400 uppercase tracking-widest border-t border-gray-700 pt-2">
                W/S: Arfagem | A/D: Guinada<br>
                Q/E: Rolagem | ESPAÇO: Fogo
            </div>
        </div>
        
        <div id="kill-feed" class="status-card text-xs w-48 opacity-80 h-32 overflow-hidden">
            <div class="text-gray-500 italic mb-1 border-b border-gray-800 pb-1">SISTEMA OPERATIVO</div>
        </div>
    </div>

    <div id="radar">
        <div id="radar-player" class="radar-ping bg-white" style="top: 50%; left: 50%;"></div>
    </div>

    <div id="crosshair"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, collection, deleteDoc, query, getDocs, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAerJxRg8JF2W2DLLCLrI7d9pIFNprMQl0",
            authDomain: "chatcat-73364.firebaseapp.com",
            databaseURL: "https://chatcat-73364-default-rtdb.firebaseio.com",
            projectId: "chatcat-73364",
            storageBucket: "chatcat-73364.firebasestorage.app",
            messagingSenderId: "645503800079",
            appId: "1:645503800079:web:850860c42bec8a73e0e47a",
            measurementId: "G-1K6TJ1G44X"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const gameId = "forest_combat_v2"; 

        let scene, camera, renderer, clock;
        let myPlane, enemies = {};
        let myId = null;
        let myData = { health: 100, score: 0 };
        let bullets = [];
        let explosions = [];
        let particles = [];
        let keys = {};
        let frameCount = 0;
        let isFalling = false;
        let fallingTimer = 0;
        let treesData = [];
        let muzzleFlash;
        const enemyTargets = {};
        

 // ================= 🔊 AUDIO PROCEDURAL =================
let audioCtx = null;
let masterGain = null;
let engineOsc = null;
let engineGain = null;
let audioUnlocked = false;

function initAudio() {
    if (audioCtx) return; // 🔒 evita recriar tudo

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // volume geral
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.6;
    masterGain.connect(audioCtx.destination);

    // ✈️ MOTOR (som contínuo)
    engineOsc = audioCtx.createOscillator();
    engineGain = audioCtx.createGain();

    engineOsc.type = "sawtooth";
    engineOsc.frequency.value = 80; // rotação mínima
    engineGain.gain.value = 0; // começa mudo

    engineOsc.connect(engineGain);
    engineGain.connect(masterGain);
    engineOsc.start();
}

// 🔓 desbloqueio obrigatório do navegador
window.addEventListener("click", () => {
    if (audioUnlocked) return;
    audioUnlocked = true;
    initAudio();
});


// 🔓 desbloqueio obrigatório do navegador
window.addEventListener("click", () => {
    if (!audioCtx) {
        initAudio();
    }

    if (audioCtx.state === "suspended") {
        audioCtx.resume();
    }
});

function playShootSound() {
    if (!audioCtx || !masterGain) return;

    // garante que o contexto está ativo
    if (audioCtx.state === "suspended") {
        audioCtx.resume();
    }

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "square";
    osc.frequency.setValueAtTime(900, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(
        120,
        audioCtx.currentTime + 0.06
    );

    gain.gain.setValueAtTime(0.35, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(
        0.001,
        audioCtx.currentTime + 0.08
    );

    osc.connect(gain);
    gain.connect(masterGain);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.08);
}



        function triggerDamageEffect() {
            const overlay = document.getElementById('damage-overlay');
            overlay.classList.remove('hit-flash');
            void overlay.offsetWidth; // Trigger reflow
            overlay.classList.add('hit-flash');
        }

        function createGrassTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 1024;
            const context = canvas.getContext('2d');
            context.fillStyle = '#1a331a';
            context.fillRect(0, 0, 1024, 1024);
            for (let i = 0; i < 20000; i++) {
                const x = Math.random() * 1024;
                const y = Math.random() * 1024;
                const size = 2 + Math.random() * 4;
                const roll = Math.random();
                if (roll > 0.8) context.fillStyle = '#0a140a';
                else if (roll > 0.5) context.fillStyle = '#22441e';
                else if (roll > 0.2) context.fillStyle = '#1e3f1a';
                else context.fillStyle = '#2d5a27';
                context.fillRect(x, y, size, size);
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(50, 50); 
            return texture;
        }

        async function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); 
            scene.fog = new THREE.FogExp2(0x87CEEB, 0.0008);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(500, 1000, 250);
            scene.add(sun);

            muzzleFlash = new THREE.PointLight(0xffff00, 0, 20);
            scene.add(muzzleFlash);

            const mapSize = 5000;
            const groundGeometry = new THREE.PlaneGeometry(mapSize, mapSize);
            const groundMaterial = new THREE.MeshPhongMaterial({ map: createGrassTexture(), shininess: 0 });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -100;
            scene.add(ground);

            const treeCount = 5000;
            const trunkGeo = new THREE.CylinderGeometry(1.2, 1.2, 8, 5);
            const trunkMat = new THREE.MeshLambertMaterial({ color: 0x3d1f00 });
            const trunkMesh = new THREE.InstancedMesh(trunkGeo, trunkMat, treeCount);
            const leavesGeo = new THREE.ConeGeometry(6, 18, 6);
            const leavesMat = new THREE.MeshLambertMaterial({ color: 0x142e0c });
            const leavesMesh = new THREE.InstancedMesh(leavesGeo, leavesMat, treeCount);

            const dummy = new THREE.Object3D();
            for (let i = 0; i < treeCount; i++) {
                const x = (Math.random() - 0.5) * (mapSize - 200);
                const z = (Math.random() - 0.5) * (mapSize - 200);
                treesData.push({ x, z, radius: 4 });
                dummy.position.set(x, -96, z);
                dummy.updateMatrix();
                trunkMesh.setMatrixAt(i, dummy.matrix);
                dummy.position.set(x, -83, z);
                dummy.scale.set(0.8 + Math.random() * 0.4, 0.8 + Math.random() * 0.4, 0.8 + Math.random() * 0.4);
                dummy.updateMatrix();
                leavesMesh.setMatrixAt(i, dummy.matrix);
            }
            scene.add(trunkMesh, leavesMesh);

            clock = new THREE.Clock();

            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) { console.error("Erro auth:", e); return; }

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    myId = user.uid;
                    document.getElementById('player-id').innerText = myId.substring(0, 8).toUpperCase();
                    setupPlayer();
                    startSync();
                    document.getElementById('loading-overlay').style.display = 'none';
                    animate();
                }
            });
        }

        function createPlaneMesh(color) {
            const group = new THREE.Group();
            const mat = new THREE.MeshPhongMaterial({ color: color, flatShading: true });
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1, 5), mat);
            group.add(body); 
            const propellerGroup = new THREE.Group();
            const propMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
            const propBlade = new THREE.Mesh(new THREE.BoxGeometry(4, 0.2, 0.1), propMat);
            propellerGroup.add(propBlade);
            propellerGroup.position.z = 2.6;
            group.add(propellerGroup);
            group.propeller = propellerGroup;
            const wings = new THREE.Mesh(new THREE.BoxGeometry(7, 0.1, 1.8), mat);
            wings.position.z = 0.5;
            group.add(wings);
            const tail = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.1, 1), mat);
            tail.position.z = -2;
            group.add(tail);
            const rudder = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.2, 0.8), mat);
            rudder.position.set(0, 0.8, -2.1);
            group.add(rudder);
            return group;
        }

        async function setupPlayer() {
            myPlane = createPlaneMesh(0xff4444);
            myPlane.position.set(0, 150, 0);
            scene.add(myPlane);
            await setDoc(doc(db, 'artifacts', gameId, 'public', 'data', 'players', myId), {
                pos: { x: 0, y: 150, z: 0 },
                rot: { x: 0, y: 0, z: 0 },
                health: 100,
                score: 0,
                lastUpdate: Date.now()
            });
        }

        function startSync() {
            onSnapshot(collection(db, 'artifacts', gameId, 'public', 'data', 'players'), (snapshot) => {
                snapshot.docChanges().forEach((change) => {
                    const data = change.doc.data();
                    const id = change.doc.id;
                    if (id === myId) {
                        // Se a vida atual for menor que a anterior, ativa o efeito visual
                        if (data.health < myData.health) triggerDamageEffect();
                        myData.health = data.health;
                        myData.score = data.score;
                        updateUI();
                        if (myData.health <= 0 && !isFalling) startFallingSequence("ESTRUTURA COMPROMETIDA!");
                        return;
                    }
                    if (change.type === "added" || change.type === "modified") {
                        if (!enemies[id]) {
                            enemies[id] = createPlaneMesh(0x4444ff);
                            scene.add(enemies[id]);
                            enemyTargets[id] = { pos: new THREE.Vector3(), rot: {x:0, y:0, z:0}, health: 100 };
                            const dot = document.createElement('div');
                            dot.id = `radar-${id}`;
                            dot.className = 'radar-ping bg-red-500';
                            document.getElementById('radar').appendChild(dot);
                        }
                        enemyTargets[id].pos.set(data.pos.x, data.pos.y, data.pos.z);
                        enemyTargets[id].rot = data.rot;
                        enemyTargets[id].health = data.health;
                        enemies[id].visible = data.health > 0 || (frameCount % 4 < 2);
                    }
                    if (change.type === "removed" && enemies[id]) {
                        scene.remove(enemies[id]);
                        document.getElementById(`radar-${id}`)?.remove();
                        delete enemies[id];
                        delete enemyTargets[id];
                    }
                });
            });

            onSnapshot(collection(db, 'artifacts', gameId, 'public', 'data', 'bullets'), (snapshot) => {
                snapshot.docChanges().forEach((change) => {
                    if (change.type === "added") {
                        const data = change.doc.data();
                        if (data.owner !== myId && Date.now() - data.timestamp < 1000) {
                            spawnBullet(new THREE.Vector3(data.pos.x, data.pos.y, data.pos.z), 
                                        new THREE.Vector3(data.dir.x, data.dir.y, data.dir.z), 
                                        data.owner, false);
                        }
                    }
                });
            });
        }

        function createExplosion(pos) {
            const particleCount = 15;
            const geo = new THREE.SphereGeometry(0.3, 4, 4);
            for(let i=0; i<particleCount; i++) {
                const mat = new THREE.MeshBasicMaterial({ color: i % 2 === 0 ? 0xffaa00 : 0xff4400 });
                const p = new THREE.Mesh(geo, mat);
                p.position.copy(pos);
                const vel = new THREE.Vector3((Math.random()-0.5)*1.5, (Math.random()-0.5)*1.5, (Math.random()-0.5)*1.5);
                scene.add(p);
                explosions.push({ mesh: p, vel, life: 1.0 });
            }
        }

        function createVaporTrail(pos) {
            const geo = new THREE.SphereGeometry(0.2, 4, 4);
            const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 });
            const p = new THREE.Mesh(geo, mat);
            p.position.copy(pos);
            scene.add(p);
            particles.push({ mesh: p, life: 1.0, type: 'trail' });
        }

        function startFallingSequence(reason) {
            if (isFalling) return;
            isFalling = true;
            fallingTimer = 0;
            updateDoc(doc(db, 'artifacts', gameId, 'public', 'data', 'players', myId), { health: 0 });
            document.getElementById('warning-msg').classList.remove('hidden');
            document.getElementById('health-fill').classList.add('danger');
            logEvent(`ALERTA: ${reason}`);
            createExplosion(myPlane.position);
        }

        function updateUI() {
            document.getElementById('health-text').innerText = Math.max(0, myData.health);
            document.getElementById('health-fill').style.width = Math.max(0, myData.health) + '%';
            document.getElementById('score').innerText = myData.score;
            
            // Vinheta persistente de perigo quando a vida está baixa (< 30)
            const overlay = document.getElementById('damage-overlay');
            if (myData.health < 30 && myData.health > 0) {
                overlay.style.boxShadow = `inset 0 0 100px rgba(255, 0, 0, ${(30 - myData.health) / 50})`;
            } else if (myData.health <= 0) {
                overlay.style.boxShadow = `inset 0 0 150px rgba(255, 0, 0, 0.7)`;
            } else {
                overlay.style.boxShadow = `inset 0 0 100px rgba(255, 0, 0, 0)`;
            }
        }

        function logEvent(msg) {
            const feed = document.getElementById('kill-feed');
            const entry = document.createElement('div');
            entry.innerText = `> ${msg}`;
            feed.prepend(entry);
            if (feed.children.length > 5) feed.removeChild(feed.lastChild);
        }

        function respawn() {
            isFalling = false;
            document.getElementById('warning-msg').classList.add('hidden');
            document.getElementById('health-fill').classList.remove('danger');
            myPlane.position.set((Math.random()-0.5)*1500, 250, (Math.random()-0.5)*1500);
            myPlane.rotation.set(0, Math.random() * Math.PI * 2, 0);
            updateDoc(doc(db, 'artifacts', gameId, 'public', 'data', 'players', myId), { health: 100 });
        }

        function spawnBullet(pos, dir, owner, isLocal = true) {
            const mesh = new THREE.Mesh(
                new THREE.SphereGeometry(0.5, 8, 8),
                new THREE.MeshBasicMaterial({ color: 0xFFFF00 })
            );
            mesh.position.copy(pos);
            scene.add(mesh);
            bullets.push({ mesh, dir: dir.clone().normalize(), owner, life: 100 });
            if (isLocal) {
                setDoc(doc(db, 'artifacts', gameId, 'public', 'data', 'bullets', `${myId}_${Date.now()}`), {
                    pos: { x: pos.x, y: pos.y, z: pos.z },
                    dir: { x: dir.x, y: dir.y, z: dir.z },
                    owner: myId,
                    timestamp: Date.now()
                });
                muzzleFlash.position.copy(pos);
                muzzleFlash.intensity = 2;
                setTimeout(() => muzzleFlash.intensity = 0, 50);
            }
        }

        function shoot() {
            if(isFalling) return;
             playShootSound(); // 🔫 SOM DO TIRO
            const direction = new THREE.Vector3(0, 0, 1).applyQuaternion(myPlane.quaternion);
            const offsetL = new THREE.Vector3(2.5, -0.2, 0.5).applyQuaternion(myPlane.quaternion);
            const offsetR = new THREE.Vector3(-2.5, -0.2, 0.5).applyQuaternion(myPlane.quaternion);
            spawnBullet(myPlane.position.clone().add(offsetL), direction, myId, true);
            spawnBullet(myPlane.position.clone().add(offsetR), direction, myId, true);
        }

        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);
            frameCount++;

            if (myPlane) {
                myPlane.propeller.rotation.z += 0.8; 
                if (!isFalling) {
                    const speed = 85 * delta;
                    myPlane.translateZ(speed);
                    if (keys['KeyW']) myPlane.rotateX(-2.2 * delta);
                    if (keys['KeyS']) myPlane.rotateX(2.2 * delta);
                    if (keys['KeyA']) myPlane.rotateY(1.5 * delta);
                    if (keys['KeyD']) myPlane.rotateY(-1.5 * delta);
                    if (keys['KeyQ']) myPlane.rotateZ(-3.5 * delta);
                    if (keys['KeyE']) myPlane.rotateZ(3.5 * delta);
                    
                    if (myPlane.position.y <= -95) startFallingSequence("COLISÃO COM O SOLO!");
                    
                    if (frameCount % 2 === 0) {
                        const tipL = new THREE.Vector3(3.5, 0, 0.5).applyQuaternion(myPlane.quaternion).add(myPlane.position);
                        const tipR = new THREE.Vector3(-3.5, 0, 0.5).applyQuaternion(myPlane.quaternion).add(myPlane.position);
                        createVaporTrail(tipL);
                        createVaporTrail(tipR);
                    }
                } else {
                    fallingTimer += delta;
                    myPlane.position.y -= 70 * delta; 
                    myPlane.rotateZ(12 * delta);     
                    myPlane.translateZ(25 * delta);  
                    if (frameCount % 3 === 0) createExplosion(myPlane.position);
                    if (myPlane.position.y < -110 || fallingTimer > 4.0) respawn();
                }

                const camPos = new THREE.Vector3(0, 5, -20).applyQuaternion(myPlane.quaternion).add(myPlane.position);
                camera.position.lerp(camPos, 0.1);
                
                if (keys['Space'] && !isFalling) {
                    camera.position.x += (Math.random() - 0.5) * 0.1;
                    camera.position.y += (Math.random() - 0.5) * 0.1;
                }

                camera.lookAt(new THREE.Vector3(0, 2, 50).applyQuaternion(myPlane.quaternion).add(myPlane.position));
                camera.up.lerp(new THREE.Vector3(0, 1, 0).applyQuaternion(myPlane.quaternion), 0.1);

                if (frameCount % 5 === 0) {
                    updateDoc(doc(db, 'artifacts', gameId, 'public', 'data', 'players', myId), {
                        pos: { x: myPlane.position.x, y: myPlane.position.y, z: myPlane.position.z },
                        rot: { x: myPlane.rotation.x, y: myPlane.rotation.y, z: myPlane.rotation.z }
                    });
                }
                if (keys['Space'] && frameCount % 7 === 0) shoot();
            }

            for (let id in enemies) {
                enemies[id].position.lerp(enemyTargets[id].pos, 0.15);
                const tRot = new THREE.Euler(enemyTargets[id].rot.x, enemyTargets[id].rot.y, enemyTargets[id].rot.z);
                enemies[id].quaternion.slerp(new THREE.Quaternion().setFromEuler(tRot), 0.15);
                enemies[id].propeller.rotation.z += 0.8;
                if (frameCount % 4 === 0) createVaporTrail(enemies[id].position.clone());
            }

            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.mesh.position.addScaledVector(b.dir, 220 * delta);
                b.life--;
                if (b.owner === myId) {
                    for (let eId in enemies) {
                        if (enemyTargets[eId].health > 0 && b.mesh.position.distanceTo(enemies[eId].position) < 6) {
                            updateDoc(doc(db, 'artifacts', gameId, 'public', 'data', 'players', eId), { health: increment(-10) }); 
                            createExplosion(b.mesh.position);
                            b.life = 0;
                        }
                    }
                } else if (!isFalling && b.mesh.position.distanceTo(myPlane.position) < 5) {
                    updateDoc(doc(db, 'artifacts', gameId, 'public', 'data', 'players', myId), { health: increment(-10) });
                    createExplosion(b.mesh.position);
                    b.life = 0;
                    camera.position.add(new THREE.Vector3((Math.random()-0.5)*2, (Math.random()-0.5)*2, (Math.random()-0.5)*2));
                }
                if (b.life <= 0) { scene.remove(b.mesh); bullets.splice(i, 1); }
            }

            for (let i = explosions.length - 1; i >= 0; i--) {
                const e = explosions[i];
                e.mesh.position.add(e.vel);
                e.life -= delta * 2;
                e.mesh.scale.setScalar(e.life);
                if (e.life <= 0) { scene.remove(e.mesh); explosions.splice(i, 1); }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.life -= delta * 1.5;
                p.mesh.scale.setScalar(p.life);
                p.mesh.material.opacity = p.life * 0.3;
                if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
