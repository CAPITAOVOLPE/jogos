<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angel Taróloga | Tarot e Intuição</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at center, #2e1065 0%, #0f0a15 80%);
            color: #e2e8f0; 
            min-height: 100vh;
        }
        .font-title { font-family: 'Cinzel', serif; }
        .glass-card { 
            background: rgba(15, 5, 25, 0.7); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(245, 158, 11, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .gold-glow { text-shadow: 0 0 10px rgba(245, 158, 11, 0.5); }
        .input-style { 
            background: rgba(0, 0, 0, 0.4); 
            border: 1px solid rgba(139, 92, 246, 0.3);
        }
        .input-style:focus { border-color: #f59e0b; }
        .strike { text-decoration: line-through; opacity: 0.6; color: #9ca3af; }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">

    <main class="w-full max-w-lg">
        <div class="text-center mb-8">
            <h1 class="font-title text-4xl text-yellow-500 mb-2 gold-glow tracking-widest">Angel Taróloga</h1>
            <p class="text-purple-200 opacity-90 italic text-sm">"Com dedicação e respeito, não meço esforços para te dar a resposta."</p>
        </div>

        <div class="flex justify-center gap-6 mb-8">
            <a href="https://www.instagram.com/angel_nyxz/" target="_blank" class="group bg-white/5 p-4 rounded-full hover:bg-yellow-600 transition-all border border-white/10 hover:border-yellow-500">
                <svg class="w-6 h-6 text-white group-hover:text-black" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.073 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.073-4.947-.197-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.689-.073-4.948-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.791-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.209-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
            </a>
            <a href="https://www.tiktok.com/@angelnyxz" target="_blank" class="group bg-white/5 p-4 rounded-full hover:bg-yellow-600 transition-all border border-white/10 hover:border-yellow-500">
                <svg class="w-6 h-6 text-white group-hover:text-black" fill="currentColor" viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.77 0 2.89 2.89 0 0 1 2.89-2.89 3.03 3.03 0 0 1 .89.13V9.23a6.07 6.07 0 0 0-1.24-.13A6.29 6.29 0 0 0 3 15.39a6.29 6.29 0 0 0 6.29 6.29 6.29 6.29 0 0 0 6.29-6.29V8.22a9.54 9.54 0 0 0 3.77 1.25V6.69z"/></svg>
            </a>
        </div>

        <div class="glass-card p-6 md:p-8 rounded-3xl">
            
            <form id="tarotForm" class="space-y-6">
                <!-- Inputs Pessoais -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2 md:col-span-1">
                        <label class="block text-xs font-semibold mb-1 text-yellow-500 tracking-wider uppercase">Nome</label>
                        <input type="text" id="name" required class="w-full input-style p-3 rounded-xl text-white outline-none transition focus:ring-2 focus:ring-yellow-500">
                    </div>
                    <div class="col-span-2 md:col-span-1">
                        <label class="block text-xs font-semibold mb-1 text-yellow-500 tracking-wider uppercase">Idade</label>
                        <input type="number" id="age" required class="w-full input-style p-3 rounded-xl text-white outline-none transition focus:ring-2 focus:ring-yellow-500">
                    </div>
                </div>

                <!-- Tabela de Preços e Seleção -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-start">
                    
                    <!-- Preços -->
                    <div class="space-y-2">
                        <label class="block text-xs font-semibold mb-2 text-yellow-500 tracking-wider uppercase">Tabela de Valores</label>
                        <div class="grid grid-cols-1 gap-1 text-xs">
                            <div class="flex justify-between items-center bg-white/5 p-2 rounded"><span>1 Pergunta</span> <span class="strike">R$ 15</span> <span class="text-yellow-400 font-bold">R$ 10</span></div>
                            <div class="flex justify-between items-center bg-white/5 p-2 rounded"><span>2 Perguntas</span> <span class="strike">R$ 28</span> <span class="text-yellow-400 font-bold">R$ 20</span></div>
                            <div class="flex justify-between items-center bg-white/5 p-2 rounded"><span>3 Perguntas</span> <span class="strike">R$ 40</span> <span class="text-yellow-400 font-bold">R$ 30</span></div>
                            <div class="flex justify-between items-center bg-white/5 p-2 rounded"><span>4 Perguntas</span> <span class="strike">R$ 50</span> <span class="text-yellow-400 font-bold">R$ 40</span></div>
                            <div class="flex justify-between items-center bg-white/5 p-2 rounded"><span>5 Perguntas</span> <span class="strike">R$ 60</span> <span class="text-yellow-400 font-bold">R$ 50</span></div>
                        </div>
                    </div>

                    <!-- Seleção -->
                    <div>
                        <label class="block text-xs font-semibold mb-2 text-yellow-500 tracking-wider uppercase">Escolha sua leitura</label>
                        <select id="numQuestions" onchange="renderQuestions()" class="w-full input-style p-3 rounded-xl text-white font-bold outline-none cursor-pointer focus:ring-2 focus:ring-yellow-500">
                            <option value="1">1 Pergunta</option>
                            <option value="2">2 Perguntas</option>
                            <option value="3">3 Perguntas</option>
                            <option value="4">4 Perguntas</option>
                            <option value="5">5 Perguntas</option>
                        </select>
                    </div>
                </div>

                <!-- Container de Perguntas -->
                <div id="questionsContainer" class="space-y-3 mt-4"></div>

                <button type="button" onclick="submitToWhatsApp()" class="w-full bg-gradient-to-r from-yellow-600 to-yellow-500 hover:from-yellow-400 hover:to-yellow-300 text-black font-bold py-4 rounded-xl transition transform hover:scale-[1.02] shadow-lg shadow-yellow-900/40 mt-4">
                    Enviar Consulta no WhatsApp
                </button>
            </form>
        </div>

        <p class="text-center text-xs text-purple-400 mt-6 italic">Angel Taróloga | Conectando você ao destino.</p>
    </main>

    <script>
        const prices = { 1: 10, 2: 20, 3: 30, 4: 40, 5: 50 };

        function renderQuestions() {
            const count = document.getElementById('numQuestions').value;
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';

            for (let i = 1; i <= count; i++) {
                const div = document.createElement('div');
                div.className = "animate-in fade-in duration-500";
                div.innerHTML = `
                    <label class="block text-[10px] uppercase font-bold mb-1 text-purple-300">Pergunta ${i}</label>
                    <textarea id="q${i}" required class="w-full input-style p-3 rounded-lg h-20 text-sm text-white focus:ring-2 focus:ring-yellow-500 outline-none" placeholder="O que deseja saber?"></textarea>
                `;
                container.appendChild(div);
            }
        }

        function submitToWhatsApp() {
            const name = document.getElementById('name').value;
            const age = document.getElementById('age').value;
            const count = document.getElementById('numQuestions').value;
            
            if (!name || !age) {
                alert('Por favor, preencha seu nome e idade.');
                return;
            }

            let questionsText = "";
            for (let i = 1; i <= count; i++) {
                const q = document.getElementById(`q${i}`).value;
                if (!q) {
                    alert('Por favor, preencha todas as perguntas.');
                    return;
                }
                questionsText += `%0A- P${i}: ${q}`;
            }

            const total = prices[count];
            const message = `Olá! Gostaria de uma leitura de Tarot.%0A%0A*Nome:* ${name}%0A*Idade:* ${age}%0A*Qtd Perguntas:* ${count}%0A*Perguntas:* ${questionsText}%0A%0A*Valor a pagar:* R$ ${total},00`;
            const url = `https://wa.me/5511991156522?text=${message}`;
            
            window.open(url, '_blank');
        }

        window.onload = renderQuestions;
    </script>
</body>
</html>
